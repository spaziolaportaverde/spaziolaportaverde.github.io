version: '3.8'

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/src
    ports:
      - "1313:1313"
    environment:
      - HUGO_BIND=0.0.0.0
      # Optional: set env vars for watermark script if needed
      - WM_INVISIBLE_ID=dev-id
    # Run the Hugo server with live reloading
    command: hugo server --bind 0.0.0.0 --buildDrafts --buildFuture --disableFastRender --logLevel=info
