image: ubuntu:latest

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  HUGO_VERSION: 0.122.0

stages:
  - process
  - build

process-images:
  stage: process
  before_script:
    - apt-get update && apt-get install -y imagemagick
  script:
    - chmod +x scripts/process_images.sh
    - ./scripts/process_images.sh
  artifacts:
    untracked: true
    paths:
      - static/images/

build-site:
  stage: build
  image: registry.gitlab.com/pages/hugo/hugo_extended:$HUGO_VERSION
  script:
    - hugo
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
