name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            fonts-liberation

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --quiet \
            "Pillow>=10.0.0" \
            "numpy>=1.24.0" \
            "invisible-watermark>=0.1.5"

      # Compute a stable hash of the images directory from git's object tree.
      # This is based on the committed state and does NOT change when the
      # watermark script modifies the files in-place, solving the restore/save
      # hash mismatch that caused the cache to always miss.
      - name: Compute image git hash
        id: image-hash
        run: |
          echo "hash=$(git ls-tree -r HEAD -- assets/images/ | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache watermarked images
        id: cache-watermark
        uses: actions/cache@v4
        with:
          path: assets/images
          key: ${{ runner.os }}-watermarked-originals-${{ steps.image-hash.outputs.hash }}

      # Watermark source JPEGs in-place BEFORE Hugo and the image processing
      # pipeline consume them. Hugo will then generate its WebP/responsive
      # variants from the already-watermarked originals.
      - name: Apply watermarks
        if: steps.cache-watermark.outputs.cache-hit != 'true'
        env:
          WM_INVISIBLE_ID: ${{ secrets.WM_INVISIBLE_ID }}
          WM_MODE: ${{ vars.WM_MODE || 'both' }}
        run: |
          python scripts/watermark.py \
            --text       "© Spazio La Porta Verde" \
            --opacity    45                       \
            --font-size  28                       \
            --angle      -30                      \
            --invisible  "${WM_INVISIBLE_ID}"     \
            --quality    88                       \
            --inplace                             \
            assets/images/ \
            assets/images/

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('layouts/**', 'content/**', 'assets/css/**', 'assets/js/**', 'assets/images/**/*.jpg', 'assets/images/**/*.jpeg', 'assets/images/**/*.png', 'assets/images/**/*.JPG', 'assets/images/**/*.JPEG', 'assets/images/**/*.PNG') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Cache Processed Images
        uses: actions/cache@v4
        with:
          path: |
            assets/images/**/*-800w.webp
            assets/images/**/*-1200w.webp
          key: ${{ runner.os }}-processed-images-${{ steps.image-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-processed-images-

      - name: Build
        run: hugo --minify

      - name: Validate Links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress public/
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4