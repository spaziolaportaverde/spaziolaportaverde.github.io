name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # ImageMagick, Python deps and fonts in a single apt round-trip
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            fonts-liberation
          pip install --quiet \
            "Pillow>=10.0.0" \
            "numpy>=1.24.0" \
            "invisible-watermark>=0.1.5"

      # Watermark source JPEGs in-place BEFORE Hugo and the image processing
      # script consume them. Hugo will then generate its WebP/responsive
      # variants from the already-watermarked originals.
      # The script skips files whose names already contain -800w, -1200w, _wm
      # so re-runs are safe and cached derivative images are never touched.
      - name: Apply watermarks
        env:
          WM_INVISIBLE_ID: ${{ secrets.WM_INVISIBLE_ID }}
        run: |
          python scripts/watermark.py \
            --text       "© Gabriella Ventavoli" \
            --opacity    45                       \
            --font-size  28                       \
            --angle      -30                      \
            --invisible  "${WM_INVISIBLE_ID}"     \
            --quality    88                       \
            --inplace                             \
            assets/images/ \
            assets/images/   # ignored when --inplace is set, kept for clarity

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('layouts/**', 'content/**', 'assets/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Cache Processed Images
        uses: actions/cache@v4
        with:
          path: |
            assets/images/**/*-800w.webp
            assets/images/**/*-1200w.webp
          key: ${{ runner.os }}-processed-images-${{ hashFiles('assets/images/**') }}
          restore-keys: |
            ${{ runner.os }}-processed-images-

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4