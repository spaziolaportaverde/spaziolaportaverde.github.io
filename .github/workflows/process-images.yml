name: Process Images and Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  process-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Run Image Processing Script
        run: |
          chmod +x scripts/process_images.sh
          ./scripts/process_images.sh

      - name: Commit Resized Images (Optional)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-generate scaled images"
          file_pattern: 'static/images/**'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo Site
        run: hugo --minify
